services:
  - type: web
    name: devmanager
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && NODE_ENV=production BASE_PATH=/ pnpm --filter @workspace/task-manager run build && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/db run push && node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: devmanager-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: devmanager-db
    plan: free
    databaseName: devmanager
